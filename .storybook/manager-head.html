<!-- Favicon — UN emblem in OCHA Blue -->
<link rel="icon" type="image/svg+xml" href="./favicon.svg">

<!-- Beta banner — sits above the manager, pushes layout down -->
<style>
  :root { --ocha-beta-banner-h: 36px; }
  body { padding-top: var(--ocha-beta-banner-h) !important; box-sizing: border-box; }
  #ocha-beta-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--ocha-beta-banner-h);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 0 16px;
    background: #161616;
    color: #FFFFFF;
    font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.02em;
    z-index: 2147483647;
    border-bottom: 2px solid #009EDB;
  }
  #ocha-beta-banner .tag {
    display: inline-block;
    padding: 2px 8px;
    background: #009EDB;
    color: #FFFFFF;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 2px;
  }
  #ocha-beta-banner a { color: #64BDEA; text-decoration: underline; }
</style>
<script>
  (function () {
    function mount() {
      if (document.getElementById('ocha-beta-banner')) return;
      var b = document.createElement('div');
      b.id = 'ocha-beta-banner';
      b.innerHTML =
        '<span class="tag">Beta</span>' +
        '<span>Under active development — contents and structure may change. Feedback to ' +
        '<a href="mailto:ochavisual@un.org">ochavisual@un.org</a>.</span>';
      document.body.prepend(b);
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', mount);
    } else {
      mount();
    }
  })();
</script>

<!-- Google Fonts for Storybook manager UI (sidebar, toolbar) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

<!--
  OCHA polish — Carbon-inspired sidebar refinement
  Tightens spacing, softens hierarchy, uses brand colour only as accent
-->
<style>
  /* Brand logo sizing (top of sidebar) */
  [class*="Sidebar"] img[alt*="OCHA"],
  [class*="sidebar"] img[alt*="OCHA"] {
    max-height: 32px;
    width: auto;
  }

  /* Sidebar section headers — quieter, uppercase, tracked */
  button[data-nodetype="root"] > span,
  [class*="SidebarItem"] [class*="Root"] {
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 11px !important;
    font-weight: 500 !important;
    color: #525252 !important;
  }

  /* Sidebar item hover — subtle grey, not full brand colour */
  button[data-selected="false"]:hover {
    background: #F4F4F4 !important;
  }

  /* Selected item — thin left accent bar in OCHA blue, not a full blue bg */
  button[data-selected="true"] {
    background: #E3EDF6 !important;
    color: #0077B8 !important;
    box-shadow: inset 3px 0 0 #009EDB !important;
  }
  button[data-selected="true"] svg {
    color: #0077B8 !important;
  }

  /* Component names in sidebar — clear hierarchy */
  button[data-nodetype="component"],
  button[data-nodetype="document"],
  button[data-nodetype="story"] {
    font-size: 13px !important;
    line-height: 1.5 !important;
  }

  /* Main heading/brand area — add breathing room */
  [class*="Brand"], [class*="brand"] {
    padding: 20px 16px !important;
  }

  /* Brand accents — thin OCHA Blue stripe at top of toolbar + right edge of sidebar.
     Subtle chrome, not a full brand band. */
  [class*="Bar"][class*="toolbar"] {
    border-top: 2px solid #009EDB !important;
    border-bottom: 1px solid #E5E5E5 !important;
  }

  /* Sidebar right edge — single 2px OCHA Blue rule on the OUTERMOST
     sidebar container only. Inner wrappers keep their default borders. */
  .sidebar-container {
    border-right: 2px solid #009EDB !important;
  }
</style>
